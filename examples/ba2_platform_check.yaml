analyze:
  profile: alice
  token: "secret"
  coord: [12, 34]
  nbytes: 262144

matrix:
  dt: [0.01]
  warmup: [100, 1000]
  quant_k: [100000.0]
  size: [128]
  scale: [0.1]
  seed_strategy: ["neighborhood3", "window_mean_3x3"]
  memory_type: ["opensimplex", "perlin"]
  chaos_engine: ["lorenz", "rossler"]

metrics:
  bit_balance: false
  byte_histogram: false
  chi_square_bytes: false
  autocorr_bits:
    enabled: false
    max_lag: 0
  runs_test_bits: false
  hamming_weight_window:
    enabled: false
    window_bits: 0
  nist_suite:
    enabled: false
    alpha: 0.01

output:
  include_timestamp_utc: true
  include_field_fingerprint: true
  include_keystream_sha256: true
  include_preview_base64: false
  preview_bytes: 0

validate:
  assert_deterministic_within_run: true
